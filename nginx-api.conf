# =========================================================================
# NGINX CONFIG 3: API & UPLOADS SUBDOMAIN (api.blackpanther-batteries.com)
# =========================================================================
# Place in: /etc/nginx/sites-available/blackpanther-api
# Link to:  sudo ln -s /etc/nginx/sites-available/blackpanther-api /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name api.blackpanther-batteries.com;

    # Maximum upload size for images (allow up to 20MB)
    client_max_body_size 20M;

    # 3A. PROXY ALL API REQUESTS TO NODE.JS EXPRESS BACKEND (Port 3000)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 3B. SERVE & PROXY UPLOADED IMAGES WITH FULL CORS SUPPORT
    # (Fixes Image 404 & CORS issues across main domain and admin subdomain)
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000/uploads/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Allow main domain and admin domain to load images freely
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept' always;

        # Cache images in browser for 30 days
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
