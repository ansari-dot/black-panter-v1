# =========================================================================
# NGINX CONFIG 1: CLIENT MAIN DOMAIN (blackpanther-batteries.com)
# =========================================================================
# Place in: /etc/nginx/sites-available/blackpanther-client
# Link to:  sudo ln -s /etc/nginx/sites-available/blackpanther-client /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name blackpanther-batteries.com www.blackpanther-batteries.com;

    # Client React App Production Build
    root /var/www/blackpanther/client/dist;
    index index.html;

    # Enable Gzip Compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;

    # React Router SPA Fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
